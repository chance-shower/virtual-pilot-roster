<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Pilot Scheduler</title>
    <link rel="manifest" href="/virtual-pilot-roster/src/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flight Roster">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="loader-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Generating...</p>
    </div>
    <div id="app">
        <div id="startPage">
            <div id="welcom-screen-container">
                <div id="websiteheader">
                Virtual Pilot Scheduler
                </div>
                <div id="websitesubheader">
                    <div id="splash-screen">
                        <div id="splash-image"></div>
                        <div id="splash-text">Virtual Pilot<br>Scheduler</div>
                    </div>
                    <div class="instruction-text">
                        Create your simulated pilot's rostered trip below...
                    </div>
                </div>
                <div id="inputdata-container">
                    <div id="inputdata">
                        <div class="input-main-form">
                            <label for="airlineCode">AIRLINE ICAO</label>
                            <input type="text" id="airlineCode" placeholder="e.g. ANZ">

                            <label for="homeBase">HOME BASE</label>
                            <input type="text" id="homeBase" placeholder="e.g. NZAA">

                            <label for="equipmentCode">AIRCRAFT TYPE(S)</label>
                            <input type="text" id="equipmentCode" placeholder="A320, AT76">

                            <label for="dutyLength">TRIP LENGTH (DAYS)</label>
                            <input type="text" id="dutyLength" placeholder="e.g. 4">
                            
                            <label>HAUL PREFERENCE</label>
                            <div class="radio-group">
                                <label class="radio-container">
                                    <input type="radio" name="haulPreference" value="short" checked>
                                    <span class="radio-label">Short</span>
                                </label>
                                <label class="radio-container">
                                    <input type="radio" name="haulPreference" value="medium">
                                    <span class="radio-label">Med</span>
                                </label>
                                <label class="radio-container">
                                    <input type="radio" name="haulPreference" value="long">
                                    <span class="radio-label">Long</span>
                                </label>
                            </div>

                            <label for="desiredAirports">DESIRED DESTINATIONS (OPTIONAL)</label>
                            <input type="text" id="desiredAirports" placeholder="NZCH, NZDN">

                            <label for="excludedAirports">EXCLUDED DESTINATIONS (OPTIONAL)</label>
                            <input type="text" id="excludedAirports" placeholder="NZQN">
                        </div>

                        <div class="input-sidebar">
                            <div class="sidebar-section">
                                <label>ROSTER TASKS</label>
                                <button class="sidebar-btn" id="openBriefcaseBtn">
                                    <img src="https://win98icons.alexmeub.com/icons/png/directory_open_cabinet_fc-4.png" width="16" height="16">
                                    <u>O</u>pen Trip...
                                </button>
                                <button class="sidebar-btn" id="sidebarManualEntry">
                                    <img src="https://win98icons.alexmeub.com/icons/png/write_yellow-1.png" width="16" height="16">
                                    <u>M</u>anual Entry
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="flightschedulebutton" style="margin-top: 15px;">
                        <button id="generateFlightRoster" style="padding: 5px 20px; font-weight: bold;">GENERATE ROSTER</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="flightSchedule" style="display: none;">
            <div id="websiteheader">
                Virtual Pilot Scheduler
            </div>
            <div id="briefcase-area">
                <div class="briefcase-row">
                    <div class="select-wrapper">
                        <select id="tripSelect">
                            <option value="">-- List of trips --</option>
                        </select>
                    </div>
                    <button id="saveCurrentTrip" title="Save this trip"><img src="media/Save.png" style="width: 20px; height: 20px;" alt=""></button>
                </div>
                <div class="briefcase-row buttons-grid">
                    <button id="exportPDF"><img src="media/Printer.png" style="width: 20px; height: 20px;" alt=""></button>
                    <button id="exportBackup"><img src="media/Open.png" style="width: 20px; height: 20px;" alt=""></button>
                    <button id="importBackup"><img src="media/Up.png" style="width: 20px; height: 20px;" alt=""></button>
                    <button id="manualEntry" title="Manual"><img src="media/Edit.png" style="width: 12px; height: 18px;" alt="Manual"></button>
                    <button id="deleteSelectedTrip"><img src="media/Recycle Bin (empty).png" style="width: 20px; height: 20px;" alt=""></button>
                </div>
            </div>
            <input type="file" id="importFile" style="display: none;" accept=".json">

            <div id="roster-header-container">
                <div id="preamble">
                    <div id="xp-fields-container">
                        <div class="xp-field">
                            <span class="xp-label">EQUIP</span>
                            <div id="display-equipment" class="xp-input-box"></div>
                        </div>
                        <div class="xp-field">
                            <span class="xp-label">BASE</span>
                            <div id="display-base" class="xp-input-box"></div>
                        </div>
                        <div class="xp-field">
                            <span class="xp-label">DAYS</span>
                            <div id="display-length" class="xp-input-box"></div>
                        </div>
                    </div>
                    <div id="airline-icon-container">
                        <img id="airline-logo" src="" alt="" style="display: none;">
                    </div>
                </div>
                <div id="rerun-container">
                    <button id="rerunButton" type="button">↻</button>
                    <div id="rerunText">Re-run roster</div>
                </div>
            </div>
        
            <div class="table-container">
                <table id="rosterTable">
                    <thead>
                        <tr>
                            <th>Day</th>
                            <th>Airline</th>
                            <th>Flight number</th>
                            <th>Aircraft</th>
                            <th>Dep</th>
                            <th>Arr</th>
                            <th>Dep gate</th>
                            <th>Arr gate</th>
                            <th>STD (local)</th>
                            <th>STD (UTC)</th>
                            <th>STA (local)</th>
                            <th>STA (UTC)</th>
                            <th>Duration</th>
                            <th>ATD</th>
                            <th>ATA</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="rosterTableBody">
                    </tbody>
                </table>
            </div>
            <br><br>
            <button id="closethisflighttrip">Close this flight trip</button>
        </div>
    </div>
    <div id="modalOverlay" class="modal-hidden">
        <div id="customModal">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons">
                <button id="modalConfirm">RESUME</button>
                <button id="modalCancel">NEW TRIP</button>
            </div>
        </div>
    </div>
    <script src="src/app.js"></script>
</body>
</html>
